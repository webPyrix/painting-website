<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offcanvas Menu — Painting Restoration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #b8953f;
    --gold-light: #d4b068;
    --gold-dim: rgba(184,149,63,0.18);
    --cream: #f5f0e8;
    --ink: #1a1610;
    --ink-mid: #2e2820;
    --parchment: #ede6d6;
    --canvas-duration: 0.72s;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  }

  body {
    font-family: 'Jost', sans-serif;
    background: #1a1610;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* ── DEMO TRIGGER AREA ── */
  .demo-bar {
    display: flex;
    align-items: center;
    gap: 2rem;
    padding: 1.2rem 2rem;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(184,149,63,0.25);
    border-radius: 4px;
    color: var(--cream);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── HAMBURGER BUTTON ── */
  .menu-toggle {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    position: relative;
    z-index: 1100;
  }

  .menu-toggle span {
    display: block;
    width: 28px;
    height: 1.5px;
    background: var(--gold);
    transition: transform 0.45s var(--ease-out-expo), opacity 0.3s ease, width 0.4s var(--ease-out-expo);
    transform-origin: center;
  }

  .menu-toggle span:nth-child(2) { width: 20px; }

  .menu-toggle.is-open span:nth-child(1) {
    transform: translateY(6.5px) rotate(45deg);
    width: 28px;
  }

  .menu-toggle.is-open span:nth-child(2) {
    opacity: 0;
    transform: scaleX(0);
  }

  .menu-toggle.is-open span:nth-child(3) {
    transform: translateY(-6.5px) rotate(-45deg);
    width: 28px;
  }

  /* ── OVERLAY ── */
  .offcanvas-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 8, 5, 0.65);
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.5s ease, visibility 0.5s ease;
    backdrop-filter: blur(2px);
  }

  .offcanvas-overlay.is-open {
    opacity: 1;
    visibility: visible;
  }

  /* ── OFFCANVAS PANEL ── */
  .offcanvas {
    position: fixed;
    top: 0;
    right: 0;
    width: min(480px, 100vw);
    height: 100vh;
    background: var(--ink);
    z-index: 1050;
    overflow: hidden;
    transform: translateX(100%);
    transition: transform var(--canvas-duration) var(--ease-out-expo);
    display: flex;
    flex-direction: column;
  }

  .offcanvas.is-open {
    transform: translateX(0);
  }

  /* ── BACKGROUND LOGO (blurred, full-height) ── */
  .offcanvas-bg-logo {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .offcanvas-bg-logo svg {
    width: 110%;
    height: 110%;
    opacity: 0.055;
    filter: blur(3px) sepia(1);
    transform: scale(1.05);
    object-fit: cover;
  }

  /* ── THIN GOLD BORDER LEFT ── */
  .offcanvas::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--gold) 20%, var(--gold) 80%, transparent);
    z-index: 10;
    opacity: 0;
    transform: scaleY(0);
    transition: opacity 0.4s ease 0.3s, transform 0.6s var(--ease-out-expo) 0.25s;
    transform-origin: center;
  }

  .offcanvas.is-open::before {
    opacity: 1;
    transform: scaleY(1);
  }

  /* ── INNER CONTENT ── */
  .offcanvas-inner {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 2.5rem 3rem;
  }

  /* ── CLOSE BUTTON ── */
  .offcanvas-close {
    align-self: flex-end;
    background: none;
    border: 0.5px solid rgba(184,149,63,0.35);
    color: var(--gold);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.25s, border-color 0.25s, transform 0.3s;
    flex-shrink: 0;
  }

  .offcanvas-close:hover {
    background: var(--gold-dim);
    border-color: var(--gold);
    transform: rotate(90deg);
  }

  /* ── DIVIDER ── */
  .offcanvas-divider {
    height: 0.5px;
    background: linear-gradient(to right, transparent, var(--gold-light), transparent);
    margin: 1.4rem 0;
    opacity: 0;
    transform: scaleX(0);
    transition: opacity 0.5s ease, transform 0.6s var(--ease-out-expo);
    transform-origin: left;
  }

  .offcanvas.is-open .offcanvas-divider {
    opacity: 1;
    transform: scaleX(1);
    transition-delay: 0.35s;
  }

  /* ── NAV LINKS ── */
  .offcanvas-nav {
    list-style: none;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.15rem;
  }

  .offcanvas-nav li {
    overflow: hidden;
  }

  .offcanvas-nav a {
    display: flex;
    align-items: baseline;
    gap: 0.9rem;
    text-decoration: none;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.7rem, 3.5vw, 2.1rem);
    letter-spacing: 0.04em;
    padding: 0.45rem 0;
    position: relative;
    transform: translateY(60px);
    opacity: 0;
    transition: color 0.3s ease, transform 0.55s var(--ease-out-expo), opacity 0.45s ease;
    white-space: nowrap;
  }

  .offcanvas-nav a .nav-num {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    opacity: 0.7;
    margin-top: 0.15em;
    flex-shrink: 0;
    align-self: center;
  }

  .offcanvas-nav a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 0.5px;
    background: var(--gold-light);
    transition: width 0.4s var(--ease-out-expo);
  }

  .offcanvas-nav a:hover {
    color: var(--gold-light);
  }

  .offcanvas-nav a:hover::after {
    width: 100%;
  }

  /* Staggered animation */
  .offcanvas.is-open .offcanvas-nav a {
    transform: translateY(0);
    opacity: 1;
  }

  .offcanvas.is-open .offcanvas-nav li:nth-child(1) a { transition-delay: 0.22s; }
  .offcanvas.is-open .offcanvas-nav li:nth-child(2) a { transition-delay: 0.28s; }
  .offcanvas.is-open .offcanvas-nav li:nth-child(3) a { transition-delay: 0.34s; }
  .offcanvas.is-open .offcanvas-nav li:nth-child(4) a { transition-delay: 0.40s; }
  .offcanvas.is-open .offcanvas-nav li:nth-child(5) a { transition-delay: 0.46s; }
  .offcanvas.is-open .offcanvas-nav li:nth-child(6) a { transition-delay: 0.52s; }
  .offcanvas.is-open .offcanvas-nav li:nth-child(7) a { transition-delay: 0.58s; }

  /* ── FOOTER ── */
  .offcanvas-footer {
    border-top: 0.5px solid rgba(184,149,63,0.2);
    padding-top: 1.4rem;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease 0.7s, transform 0.5s var(--ease-out-expo) 0.7s;
  }

  .offcanvas.is-open .offcanvas-footer {
    opacity: 1;
    transform: translateY(0);
  }

  .footer-address {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 12px;
    color: rgba(245,240,232,0.45);
    letter-spacing: 0.06em;
    line-height: 1.9;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .footer-supported {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .footer-supported-label {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.3);
  }

  .footer-supported-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    border: 0.5px solid rgba(184,149,63,0.4);
    padding: 3px 10px;
    border-radius: 2px;
  }

  /* ── NOTE AT TOP ── */
  .offcanvas-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.45s ease 0.18s, transform 0.45s var(--ease-out-expo) 0.18s;
    margin-bottom: 0.4rem;
  }

  .offcanvas.is-open .offcanvas-eyebrow {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── MEDIA QUERY: show hamburger at 992px ── */
  @media (max-width: 992px) {
    .menu-toggle { display: flex; }
  }

  @media (min-width: 993px) {
    .menu-toggle { display: none; }
    .offcanvas-overlay, .offcanvas { display: none; }
  }

  /* Demo label */
  .demo-note {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(245,240,232,0.35);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- DEMO TRIGGER BAR -->
<div class="demo-bar">
  <button class="menu-toggle" id="menuToggle" aria-label="Open navigation menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <span class="demo-note">Click the menu icon (activates at ≤992px)</span>
</div>

<!-- OVERLAY -->
<div class="offcanvas-overlay" id="offcanvasOverlay" aria-hidden="true"></div>

<!-- OFFCANVAS PANEL -->
<nav class="offcanvas" id="offcanvas" aria-label="Site navigation" aria-hidden="true">

  <!-- Full-height blurred logo background -->
  <div class="offcanvas-bg-logo" aria-hidden="true">
    <!-- Ornate painting restoration emblem SVG -->
    <svg viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g opacity="1">
        <!-- Outer ornate frame -->
        <ellipse cx="200" cy="300" rx="170" ry="250" stroke="#b8953f" stroke-width="1.5" fill="none"/>
        <ellipse cx="200" cy="300" rx="155" ry="235" stroke="#b8953f" stroke-width="0.5" fill="none"/>
        <!-- Corner flourishes top -->
        <path d="M80 80 Q120 60 160 80 Q140 100 120 90 Q100 110 80 80Z" fill="#b8953f"/>
        <path d="M320 80 Q280 60 240 80 Q260 100 280 90 Q300 110 320 80Z" fill="#b8953f"/>
        <!-- Corner flourishes bottom -->
        <path d="M80 520 Q120 540 160 520 Q140 500 120 510 Q100 490 80 520Z" fill="#b8953f"/>
        <path d="M320 520 Q280 540 240 520 Q260 500 280 510 Q300 490 320 520Z" fill="#b8953f"/>
        <!-- Central brush motif -->
        <rect x="195" y="140" width="10" height="160" rx="5" fill="#b8953f"/>
        <ellipse cx="200" cy="135" rx="12" ry="20" fill="#b8953f"/>
        <!-- Palette circle -->
        <circle cx="200" cy="370" r="55" stroke="#b8953f" stroke-width="1" fill="none"/>
        <circle cx="200" cy="370" r="35" stroke="#b8953f" stroke-width="0.5" fill="none"/>
        <!-- Paint dots on palette -->
        <circle cx="178" cy="358" r="6" fill="#b8953f" opacity="0.6"/>
        <circle cx="222" cy="358" r="6" fill="#b8953f" opacity="0.6"/>
        <circle cx="190" cy="380" r="6" fill="#b8953f" opacity="0.6"/>
        <circle cx="210" cy="380" r="5" fill="#b8953f" opacity="0.6"/>
        <circle cx="200" cy="358" r="4" fill="#b8953f" opacity="0.8"/>
        <!-- Horizontal ornament lines -->
        <line x1="60" y1="300" x2="140" y2="300" stroke="#b8953f" stroke-width="0.75"/>
        <line x1="260" y1="300" x2="340" y2="300" stroke="#b8953f" stroke-width="0.75"/>
        <circle cx="150" cy="300" r="4" fill="#b8953f"/>
        <circle cx="250" cy="300" r="4" fill="#b8953f"/>
        <!-- Text arch -->
        <path id="archPath" d="M 120 230 A 90 90 0 0 1 280 230" fill="none"/>
        <text font-family="serif" font-size="13" letter-spacing="6" fill="#b8953f">
          <textPath href="#archPath" startOffset="10%">RESTORATION · ART ·</textPath>
        </text>
      </g>
    </svg>
  </div>

  <!-- Content -->
  <div class="offcanvas-inner">
    <!-- Close button -->
    <button class="offcanvas-close" id="offcanvasClose" aria-label="Close navigation menu">&#x2715;</button>

    <!-- Eyebrow label -->
    <p class="offcanvas-eyebrow">Navigation</p>

    <!-- Gold divider -->
    <div class="offcanvas-divider"></div>

    <!-- Nav links -->
    <ul class="offcanvas-nav" role="list">
      <li><a href="#"><span class="nav-num">01</span>Home</a></li>
      <li><a href="#"><span class="nav-num">02</span>About</a></li>
      <li><a href="#"><span class="nav-num">03</span>Services</a></li>
      <li><a href="#"><span class="nav-num">04</span>Projects</a></li>
      <li><a href="#"><span class="nav-num">05</span>Media &amp; Publications</a></li>
      <li><a href="#"><span class="nav-num">06</span>Blogs</a></li>
      <li><a href="#"><span class="nav-num">07</span>Contact</a></li>
    </ul>

    <!-- Footer -->
    <footer class="offcanvas-footer">
      <address class="footer-address" style="font-style: normal;">
        Studio 14, Heritage Arts Complex<br>
        Regal Building, M.G. Road<br>
        Mumbai – 400 001, India
      </address>
      <div class="footer-supported">
        <span class="footer-supported-label">Supported by</span>
        <span class="footer-supported-name">Tata Trusts</span>
      </div>
    </footer>
  </div>
</nav>

<script>
  const toggle    = document.getElementById('menuToggle');
  const overlay   = document.getElementById('offcanvasOverlay');
  const offcanvas = document.getElementById('offcanvas');
  const closeBtn  = document.getElementById('offcanvasClose');

  function openMenu() {
    offcanvas.classList.add('is-open');
    overlay.classList.add('is-open');
    toggle.classList.add('is-open');
    offcanvas.setAttribute('aria-hidden', 'false');
    overlay.setAttribute('aria-hidden', 'false');
    toggle.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }

  function closeMenu() {
    offcanvas.classList.remove('is-open');
    overlay.classList.remove('is-open');
    toggle.classList.remove('is-open');
    offcanvas.setAttribute('aria-hidden', 'true');
    overlay.setAttribute('aria-hidden', 'true');
    toggle.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }

  toggle.addEventListener('click', () => {
    offcanvas.classList.contains('is-open') ? closeMenu() : openMenu();
  });

  overlay.addEventListener('click', closeMenu);
  closeBtn.addEventListener('click', closeMenu);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && offcanvas.classList.contains('is-open')) closeMenu();
  });

  // Nav links — close on click (for SPA-style)
  offcanvas.querySelectorAll('.offcanvas-nav a').forEach(link => {
    link.addEventListener('click', closeMenu);
  });
</script>
</body>
</html>
